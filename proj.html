<!DOCTYPE html>
<meta charset="utf-8">
          
<!-- Load d3.js -->
<script src="https://d3js.org/d3.v6.js"></script>

<div class="text-center">
  <button onclick="update('2015.csv')">2015</button>
  <button onclick="update('2016.csv')">2016</button>
  <button onclick="update('2017.csv')">2017</button>
  <button onclick="update('2018.csv')">2018</button>
  <button onclick="update('2019.csv')">2019</button>
  <button onclick="update('2020.csv')">2020</button>
  <button onclick="update('2020.csv')">2021</button>

</div>
<div id="scatter_plot"></div>

<style>
  .bubble {
    stroke-width: 1px;
    stroke: white;
  }
  .bubble:hover {
    stroke: black;
  }
  .text-center {
  text-align: center;
  }
  div.tooltip {
    position: absolute;
    text-align: center;
    width: 150px;
    height: 120px;
    padding: 2px;
    font: 12px sans-serif;
    background: lightsteelblue;
    border: 0px;
    border-radius: 8px;
    pointer-events: none;
  }
}

</style>

<script>

  const margin = {top: 50, right: 200, bottom: 300, left: 100},
      width = 1500- margin.left - margin.right,
      height = 980 - margin.top - margin.bottom;
  
  var svg = d3.select("#scatter_plot")
    .append("svg")
      .attr("width", width + margin.left + margin.right)
      .attr("height", height + margin.top + margin.bottom)
    .append("g")
      .attr("transform", `translate(${margin.left},${margin.top})`);
  

  var regions = ['Australia and New Zealand', 'Central and Eastern Europe', 'Eastern Asia', 'Latin America and Caribbean', 'Middle East and Northern Africa', 'North America', 'Southeastern Asia', 'Southern Asia', 'Sub-Saharan Africa', 'Western Europe']
  var colorMap = d3.scaleOrdinal()
      .domain(regions)
      .range(d3.schemeCategory10);
  var tooltip = d3.select("#scatter_plot")
      .append("div")
      .style("opacity", 0)
      .attr("class", "tooltip")

  // Outer function to read in csv files
  function update(dataset) {
    d3.csv(dataset).then( function(data) {
    
    console.log(data)
    d3.selectAll("g > *").remove()

    // Add x and y axes
    const x = d3.scaleLinear()
      .domain([0, 2.3])
      .range([ 0, width ]);
    const y = d3.scaleLinear()
      .domain([2, 9])
      .range([ height, 0]);
    // Add a scale for bubble size
    const z = d3.scaleLinear()
      .domain([0, 0.8])
      .range([ 2, 40]);
    
   
    
    const mouseover = function(event, d) {
      tooltip
        .style("opacity", 1)
    };

    const mousemove = function(event, d) {
      tooltip
        .html(`Country: ${d['Country']}` + '<br/><br/>' + `Happiness Score: ${d['Happiness Score']}` + '<br/>' + 
        `Explained by GDP per Capita: ${d['GDP per Capita']}` + `<br/>` + `Explained by Freedom & Civil Liberties: ${d['Freedom']}`)
        .style("left", (event.pageX) + "px")
        .style("top", (event.pageY - 28) + "px");
    };

    const mouseleave = function(event,d) {
      tooltip
        .transition()
        .duration(100)
        .style("opacity", 0)
    };

    // Add dots
    var dots = svg.append('g')
      .selectAll("dot")
      .data(data)
      .join("circle")
      .attr("cx", d => x(d['GDP per Capita']))
      .attr("cy", d => y(d['Happiness Score']))
      .attr("r", 0)
      .attr("class", "bubble")
    
    dots.transition()
      .duration(1000)
      .attr("r", d => z(d['Freedom']))
      .style("fill", "#69b3a2")
      .style("opacity", "0.7")
      .attr("stroke", "black")
      .style("fill", d => colorMap(d.Region))
    
    dots.on("mouseover", mouseover)
      .on("mousemove", mousemove)
      .on("mouseleave", mouseleave);
          

    svg.append("g")
      .attr("transform", `translate(0, ${height})`)
      .transition()
      .duration(1000)
      .call(d3.axisBottom(x));

    svg.append("g")
      .transition()
      .duration(1000)
      .call(d3.axisLeft(y));

    svg.selectAll("legend_dots")
    .data(regions)
    .enter()
    .append("circle")
    .attr("cx", 1050)
    .attr("cy", function(d,i){ return 300 + i*20}) 
    .attr("r", 0)
    .transition()
    .duration(1000)
    .attr("r", 7)
    .style("fill", d => colorMap(d))

    svg.selectAll("legend_labels")
    .data(regions)
    .enter()
    .append("text")
    .attr("x", 1070)
    .attr("y", function(d,i){ return 300 + i*20}) 
    .style("fill", d => colorMap(d))
    .text(d => d)
    .attr("text-anchor", "left")
    .style("alignment-baseline", "middle")

    })
  
  }

  
  update("2021.csv")

  </script>




</script>
